<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Immersive Media Lab · IMMEDIA</title>
  <meta name="description" content="Immersive Media Lab at Seoul National University of Science and Technology — VR/AR/XR, 3D reconstruction, neural rendering." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">

  <style>
    html, body { margin: 0; padding: 0; background: #f6f4ef; }
    #root { min-height: 100vh; }

    body {
      opacity: 0;
      transition: opacity 0.3s ease-in-out;
    }
    body.fonts-loaded {
      opacity: 1;
    }
  </style>
  
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "@mkkellogg/gaussian-splats-3d": "https://unpkg.com/@mkkellogg/gaussian-splats-3d@0.3.1/build/gaussian-splats-3d.module.js"
    }
  }
  </script>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

  <script type="text/babel" src="js/data.jsx"></script>
  <script type="text/babel" src="js/shell.jsx"></script>
  <script type="text/babel" src="js/hero3d.jsx"></script>
  <script type="text/babel" src="js/home.jsx"></script>
  
  <script type="text/babel">
    const App = () => {
      React.useEffect(() => {
        // 화면을 다 그렸다는 커스텀 이벤트를 발생시킵니다.
        window.dispatchEvent(new Event('react-rendered'));
      }, []);
      return <Shell active="home"><Home /></Shell>;
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

  <script>
    // 1. 폰트 로딩이 끝나는 것을 기다립니다.
    const fontsReady = document.fonts.ready;
    
    // 2. React가 화면을 다 그렸다는 신호(이벤트)를 기다립니다.
    const reactReady = new Promise(resolve => {
      window.addEventListener('react-rendered', resolve, { once: true });
    });

    // 3. 폰트 로딩과 React 렌더링 두 가지가 모두 완벽하게 끝나면 비로소 화면을 띄웁니다!
    Promise.all([fontsReady, reactReady]).then(() => {
      // 아주 미세한 CSS 계산 시간을 벌어주기 위해 0.05초(50ms) 정도만 뜸을 들입니다.
      setTimeout(() => {
        document.body.classList.add('fonts-loaded');
      }, 50);
    });
  </script>
</body>
</html>
